services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception
    expose:
      - "3306"

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    depends_on:
      - mariadb
      - redis
    volumes:
      - wp:/var/www/html
    networks:
      - inception
    expose:
      - "9000"
  
  backup:
    build: ./requirements/backup
    container_name: backup
    volumes:
      - wp:/source:ro
      - backup_data:/backup
    restart: always
    networks:
      - inception

  redis:
    build: ./requirements/redis
    container_name: redis
    networks:
      - inception
    restart: always

  ftp:
    build: ./requirements/ftp
    container_name: ftp
    env_file:
      - .env
    secrets:
      - credentials
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    depends_on:
      - wordpress
    volumes:
      - wp:/var/www/html
    networks:
      - inception

  static-website:
    build: ./requirements/static-website
    container_name: static-website
    ports:
      - "8080:80"
    restart: always
    networks: 
      - inception
  
  adminer:
    build: ./requirements/adminer
    container_name: adminer
    ports:
      - "8081:8080"
    restart: always
    depends_on:
      - mariadb
    networks:
      - inception

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wp:/var/www/html:ro
    networks:
      - inception

volumes:
  backup_data:
  db:
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/db
  wp:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

networks:
  inception:
    driver: bridge
    name: inception
